    <body class="flex items-center justify-center min-h-screen p-layout-margin font-body-default text-on-background">
    <main class="w-full max-w-[400px] flex flex-col items-center">
    <!-- Logo Area -->
    <div class="mb-xxl flex flex-col items-center gap-sm">
    <div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center shadow-sm">
    <span class="material-symbols-outlined text-surface-white text-3xl" data-icon="rocket_launch">rocket_launch</span>
    </div>
    <h1 class="font-headline-md text-headline-md font-bold text-primary">NexusDesk AI</h1>
    </div>
    <!-- Login Card -->
    <section class="glass-card w-full p-xxl rounded-xl">
    <div class="mb-lg">
    <h2 class="font-headline-sm text-headline-sm text-on-surface">Welcome Back</h2>
    <p class="text-text-secondary font-body-default mt-xs">Access your intelligent workspace</p>
    </div>
    <form class="space-y-lg" id="loginForm">
    <!-- Email Input -->
    <div class="space-y-xs">
    <label class="font-label-bold text-label-bold text-on-surface-variant" for="email">Email Address</label>
    <div class="relative group">
    <div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-outline">
    <span class="material-symbols-outlined text-[20px]" data-icon="mail">mail</span>
    </div>
    <input class="block w-full pl-10 pr-md py-[10px] border-border-default rounded-lg text-body-default placeholder:text-text-tertiary focus:border-primary transition-all duration-200" id="email" name="email" placeholder="name@company.com" required="" type="email">
    </div>
    </div>
    <!-- Password Input -->
    <div class="space-y-xs">
    <label class="font-label-bold text-label-bold text-on-surface-variant" for="password">Password</label>
    <div class="relative group">
    <div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-outline">
    <span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
    </div>
    <input class="block w-full pl-10 pr-10 py-[10px] border-border-default rounded-lg text-body-default placeholder:text-text-tertiary focus:border-primary transition-all duration-200" id="password" name="password" placeholder="????????" required="" type="password">
    <button class="absolute inset-y-0 right-0 pr-md flex items-center text-outline hover:text-primary transition-colors" onclick="togglePassword()" type="button">
    <span class="material-symbols-outlined text-[20px]" data-icon="visibility" id="eyeIcon">visibility</span>
    </button>
    </div>
    </div>
    <!-- Remember & Forgot -->
    <div class="flex items-center justify-between">
    <label class="flex items-center gap-xs cursor-pointer group">
    <input class="w-4 h-4 rounded border-border-default text-primary focus:ring-primary/20" type="checkbox">
    <span class="font-body-sm text-body-sm text-text-secondary group-hover:text-on-surface transition-colors">Remember me</span>
    </label>
    <a class="font-label-bold text-label-bold text-primary hover:underline transition-all" href="login.html">Forgot password?</a>
    </div>
    <!-- CTA Button -->
    <button class="w-full bg-primary hover:bg-primary-container text-surface-white font-label-bold text-body-default py-md rounded-lg shadow-sm hover:shadow-md active:scale-[0.98] transition-all duration-200" type="submit">
                        Sign In
                    </button>
    </form>
    <!-- AI Insight Hint (Subtle SaaS visual) -->
    <div class="mt-xl p-md bg-ai-gold-subtle rounded-lg border-l-2 border-ai-gold flex gap-md items-start">
    <span class="material-symbols-outlined text-ai-gold text-[18px]" data-icon="bolt">bolt</span>
    <p class="text-xs text-[#693c00] leading-relaxed">
                        Nexus AI detected a login attempt from a new device? <a class="font-bold underline" href="analytics.html">Review security logs</a>

    <script>
            function togglePassword() {
                const input = document.getElementById('password');
                const icon = document.getElementById('eyeIcon');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.textContent = 'visibility_off';
                } else {
                    input.type = 'password';
                    icon.textContent = 'visibility';
                }
            }
    
            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const btn = e.target.querySelector('button[type="submit"]');
                const originalText = btn.textContent;
                
                // Micro-interaction simulation
                btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span>';
                btn.disabled = true;
    
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            });
        </script>
